<!DOCTYPE html>
<html>
<head>
    <title>Students Salary Report</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            color: white;
            margin-top: 40px;
        }

        .container {
            margin: 40px auto;
            width: 80%;
            max-width: 800px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #667eea;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .loading {
            font-size: 18px;
            color: #555;
        }

        .error {
            color: red;
        }
    </style>

</head>
<body>

    <h1>Students with Salary Above 2024 Average</h1>

    <div class="container">
        <p class="loading" id="loading">Loading data...</p>

        <table id="studentsTable" style="display:none;">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Salary</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <p class="error" id="error"></p>
    </div>

    <script>
        const apiURL = "https://sql-project-gr1o.onrender.com/students";

        fetch(apiURL)
            .then(response => response.json())
            .then(data => {
                const tableBody = document.querySelector("#studentsTable tbody");
                const loading = document.getElementById("loading");
                const table = document.getElementById("studentsTable");

                loading.style.display = "none";
                table.style.display = "table";

                data.forEach(student => {
                    const row = document.createElement("tr");

                    row.innerHTML = `
                        <td>${student.name}</td>
                        <td>${student.age}</td>
                        <td>${student.salary}</td>
                    `;

                    tableBody.appendChild(row);
                });
            })
            .catch(error => {
                document.getElementById("loading").style.display = "none";
                document.getElementById("error").innerText =
                    "Failed to load data. Please check backend.";
                console.error(error);
            });
    </script>

</body>
</html>
